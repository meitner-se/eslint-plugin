name: Test

on:
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Install pnpm
              uses: pnpm/action-setup@v4
            - name: Set-up Node 24.x
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm
            - name: Install
              run: pnpm install --frozen-lockfile
            - name: Test
              run: pnpm test
